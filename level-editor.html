<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoCoPro Level Editor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #17191c;
      color: #e6e1d7;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, select, input, textarea {
      font: inherit;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px 12px;
      background: #24282d;
      border-bottom: 1px solid #383f46;
    }
    .brand {
      font-weight: 800;
      color: #ffd35c;
      white-space: nowrap;
      margin-right: 8px;
    }
    label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #bfc6ce;
      font-size: 13px;
      white-space: nowrap;
    }
    select, input[type="number"], input[type="range"] {
      color: #f4f0e8;
      background: #111316;
      border: 1px solid #4b535c;
      border-radius: 5px;
      min-height: 30px;
      padding: 4px 8px;
    }
    input[type="number"] {
      width: 92px;
    }
    input[type="range"] {
      width: 130px;
      padding: 0;
    }
    button {
      min-height: 30px;
      border: 1px solid #59636d;
      border-radius: 5px;
      color: #f8f5ee;
      background: #303741;
      padding: 4px 10px;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: #3b4450; }
    button.primary {
      color: #1b1608;
      border-color: #d7a928;
      background: #f0c94f;
      font-weight: 700;
    }
    button.danger {
      border-color: #835250;
      background: #55302e;
    }
    button:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .workspace {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(520px, 62vh) minmax(300px, 38vh);
    }
    .stage-wrap {
      min-width: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      background: #101214;
    }
    .canvas-scroll {
      min-height: 0;
      overflow: auto;
      padding: 12px;
    }
    #stage {
      display: block;
      background: #87ceeb;
      border: 1px solid #3c454e;
      image-rendering: pixelated;
      cursor: grab;
    }
    #stage.dragging { cursor: grabbing; }
    .statusbar {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 34px;
      padding: 6px 12px;
      background: #20242a;
      border-top: 1px solid #353c44;
      color: #aeb7c0;
      font-size: 12px;
      white-space: nowrap;
      overflow-x: auto;
    }
    .side {
      min-width: 0;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      border-top: 1px solid #383f46;
      background: #1f2328;
    }
    .props {
      padding: 12px;
      border-right: 1px solid #383f46;
      display: grid;
      align-content: start;
      gap: 10px;
      overflow: auto;
    }
    .props h2 {
      margin: 0;
      color: #f5d15d;
      font-size: 14px;
    }
    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 8px;
    }
    .field-grid label {
      align-items: stretch;
      flex-direction: column;
      gap: 4px;
      white-space: normal;
    }
    .field-grid input, .field-grid select {
      width: 100%;
    }
    .json-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: 12px;
      gap: 8px;
    }
    .json-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .json-head h2 {
      margin: 0;
      color: #f5d15d;
      font-size: 14px;
    }
    #jsonOutput {
      width: 100%;
      min-height: 0;
      resize: none;
      color: #e8edf2;
      background: #101316;
      border: 1px solid #3f4851;
      border-radius: 5px;
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
      tab-size: 2;
    }
    .drop-line {
      min-height: 78px;
      border: 1px dashed #59636d;
      border-radius: 5px;
      padding: 8px;
      color: #aeb7c0;
      background: #171b20;
    }
    .hidden { display: none; }
    @media (max-width: 980px) {
      .side {
        grid-template-columns: 1fr;
      }
      .props {
        border-right: 0;
        border-bottom: 1px solid #383f46;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="brand">LoCoPro Level Editor</div>
    <label>Level <select id="levelSelect"></select></label>
    <button id="loadBtn" class="primary">Load</button>
    <button id="importBtn">Import JSON</button>
    <label>Zoom <input id="zoomInput" type="range" min="0.06" max="0.28" step="0.01" value="0.14"></label>
    <label>Snap <input id="snapInput" type="number" min="1" max="200" step="1" value="10"></label>
    <label>Add <select id="addType">
      <option value="platform">Platform</option>
      <option value="gap">Gap</option>
      <option value="obstacle">Obstacle</option>
      <option value="checkpoint">Checkpoint</option>
    </select></label>
    <label id="obstacleTypeWrap">Type <select id="obstacleType"></select></label>
    <button id="addBtn">Add At View</button>
    <button id="undoBtn" disabled>Undo</button>
    <button id="deleteBtn" class="danger" disabled>Delete</button>
    <button id="flipBtn" class="primary" disabled>Flip X</button>
  </div>

  <div class="workspace">
    <div class="stage-wrap">
      <div id="canvasScroll" class="canvas-scroll">
        <canvas id="stage" width="960" height="500"></canvas>
      </div>
      <div class="statusbar">
        <span id="levelMeta">No level loaded</span>
        <span id="selectionMeta">No selection</span>
        <span id="mouseMeta">x: 0, y: 0</span>
      </div>
    </div>

    <aside class="side">
      <section class="props">
        <h2>Selection</h2>
        <div id="emptyProps" class="drop-line">Select an item on the stage.</div>
        <div id="propFields" class="field-grid hidden"></div>
      </section>
      <section class="json-panel">
        <div class="json-head">
          <h2>JSON Output</h2>
          <button id="copyBtn">Copy</button>
        </div>
        <textarea id="jsonOutput" spellcheck="false"></textarea>
      </section>
    </aside>
  </div>
</div>

<script type="module">
import { getObstacleDef } from './src/obstacles.js';

const CANVAS_H = 500;
const GROUND_Y = 456;
const GROUND_H = 44;
const PLATFORM_H = 16;
const FINISH_FLAG_OFFSET = 100;
const OBSTACLE_TYPES = [
  'prairie_dog', 'tumbleweed', 'hay_bale', 'road_cone', 'deer', 'cyclist',
  'boulder', 'hawk', 'steel_steps', 'rattlesnake', 'folding_chair',
  'barbed_wire_bat', 'crowd_barrier', 'spotlight', 'crumbling_platform',
];
const ZONE_SKY = {
  1: '#87ceeb',
  2: '#6a9dcc',
  3: '#5588bb',
  4: '#7ab0d4',
  5: '#141424',
};
const ZONE_GROUND = {
  1: '#4f9a31',
  2: '#34373b',
  3: '#9b7b38',
  4: '#a87134',
  5: '#5a321d',
};
const COLORS = {
  platform: '#d7aa38',
  platformTop: '#ffe680',
  gap: '#13171a',
  obstacle: '#dc6557',
  checkpoint: '#65c586',
  finish: '#f0d24f',
  selected: '#ffffff',
};

const dom = {
  levelSelect: document.querySelector('#levelSelect'),
  loadBtn: document.querySelector('#loadBtn'),
  importBtn: document.querySelector('#importBtn'),
  zoomInput: document.querySelector('#zoomInput'),
  snapInput: document.querySelector('#snapInput'),
  addType: document.querySelector('#addType'),
  obstacleType: document.querySelector('#obstacleType'),
  obstacleTypeWrap: document.querySelector('#obstacleTypeWrap'),
  addBtn: document.querySelector('#addBtn'),
  undoBtn: document.querySelector('#undoBtn'),
  deleteBtn: document.querySelector('#deleteBtn'),
  canvasScroll: document.querySelector('#canvasScroll'),
  stage: document.querySelector('#stage'),
  levelMeta: document.querySelector('#levelMeta'),
  selectionMeta: document.querySelector('#selectionMeta'),
  mouseMeta: document.querySelector('#mouseMeta'),
  emptyProps: document.querySelector('#emptyProps'),
  propFields: document.querySelector('#propFields'),
  jsonOutput: document.querySelector('#jsonOutput'),
  copyBtn: document.querySelector('#copyBtn'),
  flipBtn: document.querySelector('#flipBtn'),
};

const ctx = dom.stage.getContext('2d');
const state = {
  level: null,
  history: [],
  zoom: Number(dom.zoomInput.value),
  selected: null,
  drag: null,
  hover: null,
  pointer: { x: 0, y: 0 },
};

for (let i = 1; i <= 25; i += 1) {
  const option = document.createElement('option');
  option.value = String(i).padStart(2, '0');
  option.textContent = `level-${option.value}.json`;
  dom.levelSelect.append(option);
}
dom.levelSelect.value = '03';

OBSTACLE_TYPES.forEach(type => {
  const option = document.createElement('option');
  option.value = type;
  option.textContent = type;
  dom.obstacleType.append(option);
});

dom.loadBtn.addEventListener('click', () => loadLevel(dom.levelSelect.value));
dom.importBtn.addEventListener('click', importFromOutput);
dom.zoomInput.addEventListener('input', () => {
  state.zoom = Number(dom.zoomInput.value);
  resizeCanvas();
  draw();
});
dom.addType.addEventListener('change', () => {
  dom.obstacleTypeWrap.classList.toggle('hidden', dom.addType.value !== 'obstacle');
});
dom.addBtn.addEventListener('click', addAtView);
dom.undoBtn.addEventListener('click', undo);
dom.deleteBtn.addEventListener('click', deleteSelection);
dom.flipBtn.addEventListener('click', () => {
  flipSelectedObstacle();
});
dom.copyBtn.addEventListener('click', async () => {
  dom.jsonOutput.select();
  await navigator.clipboard?.writeText(dom.jsonOutput.value).catch(() => document.execCommand('copy'));
});
dom.jsonOutput.addEventListener('change', importFromOutput);
dom.stage.addEventListener('pointerdown', onPointerDown);
dom.stage.addEventListener('pointermove', onPointerMove);
dom.stage.addEventListener('pointerup', onPointerUp);
dom.stage.addEventListener('pointerleave', onPointerUp);
window.addEventListener('keydown', event => {
  const tag = event.target?.tagName || '';
  if (['INPUT', 'SELECT', 'TEXTAREA'].includes(tag)) return;
  if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'z') {
    event.preventDefault();
    undo();
    return;
  }
  if ((event.key === 'Delete' || event.key === 'Backspace') && state.selected) {
    event.preventDefault();
    deleteSelection();
    return;
  }
  if (event.key.toLowerCase() === 'f' && state.selected?.kind === 'obstacle') {
    event.preventDefault();
    flipSelectedObstacle();
  }
});

loadLevel(dom.levelSelect.value);

async function loadLevel(id) {
  const response = await fetch(`levels/level-${id}.json`, { cache: 'no-store' });
  if (!response.ok) throw new Error(`Could not load level-${id}.json`);
  setLevel(await response.json());
}

function setLevel(level, options = {}) {
  const resetHistory = options.resetHistory !== false;
  state.level = clone(level);
  ensureArrays(state.level);
  state.selected = null;
  state.drag = null;
  if (resetHistory) state.history = [];
  resizeCanvas();
  renderProps();
  updateOutput();
  draw();
  updateUndoButton();
}

function ensureArrays(level) {
  level.gaps ||= [];
  level.platforms ||= [];
  level.obstacles ||= [];
  level.checkpoints ||= [];
}

function clone(value) {
  return JSON.parse(JSON.stringify(value));
}

function resizeCanvas() {
  if (!state.level) return;
  dom.stage.width = Math.max(888, Math.ceil(state.level.endX * state.zoom));
  dom.stage.height = CANVAS_H;
}

function draw() {
  if (!state.level) return;
  const z = state.zoom;
  const level = state.level;
  ctx.clearRect(0, 0, dom.stage.width, dom.stage.height);
  ctx.fillStyle = ZONE_SKY[level.zone] || ZONE_SKY[1];
  ctx.fillRect(0, 0, dom.stage.width, CANVAS_H);

  drawBackgroundBands(level);
  drawGrid();
  drawGround(level);
  drawGaps(level);
  drawPlatforms(level);
  drawObstacles(level);
  drawCheckpoints(level);
  drawFinish(level);
}

function drawBackgroundBands(level) {
  const z = state.zoom;
  ctx.fillStyle = level.zone === 5 ? '#292336' : 'rgba(255,255,255,0.18)';
  for (let x = -120; x < level.endX; x += 360) {
    const sx = x * z;
    ctx.beginPath();
    ctx.moveTo(sx, 220);
    ctx.lineTo(sx + 80, 140);
    ctx.lineTo(sx + 180, 220);
    ctx.closePath();
    ctx.fill();
  }
}

function drawGrid() {
  const z = state.zoom;
  ctx.save();
  ctx.strokeStyle = 'rgba(20,24,28,0.18)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= state.level.endX; x += 500) {
    const sx = Math.round(x * z) + 0.5;
    ctx.beginPath();
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx, CANVAS_H);
    ctx.stroke();
  }
  for (let y = 40; y < GROUND_Y; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y + 0.5);
    ctx.lineTo(dom.stage.width, y + 0.5);
    ctx.stroke();
  }
  ctx.restore();
}

function drawGround(level) {
  ctx.fillStyle = ZONE_GROUND[level.zone] || ZONE_GROUND[1];
  ctx.fillRect(0, GROUND_Y, dom.stage.width, GROUND_H);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(0, GROUND_Y, dom.stage.width, 4);
}

function drawGaps(level) {
  level.gaps.forEach((gap, index) => {
    const rect = rectFor('gap', gap);
    ctx.fillStyle = COLORS.gap;
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    ctx.fillStyle = '#5fa3d7';
    ctx.fillRect(rect.x, rect.y + rect.h - 5, rect.w, 5);
    drawLabel(`gap ${index + 1}`, rect.x + 4, rect.y + 14);
    drawSelection('gap', index, rect);
  });
}

function drawPlatforms(level) {
  level.platforms.forEach((platform, index) => {
    const rect = rectFor('platform', platform);
    ctx.fillStyle = platform.crumbling ? '#8b6a25' : COLORS.platform;
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    ctx.fillStyle = platform.crumbling ? '#f1c65b' : COLORS.platformTop;
    ctx.fillRect(rect.x, rect.y, rect.w, 4);
    drawLabel(`platform ${index + 1}`, rect.x + 4, rect.y - 5);
    drawSelection('platform', index, rect);
  });
}

function drawObstacles(level) {
  level.obstacles.forEach((obstacle, index) => {
    const rect = rectFor('obstacle', obstacle);
    ctx.fillStyle = obstacleColor(obstacle.type);
    roundRect(rect.x, rect.y, rect.w, rect.h, 5);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(rect.x, rect.y + rect.h - 5, rect.w, 5);
    drawLabel(obstacleLabel(obstacle), rect.x, rect.y - 5);
    drawSelection('obstacle', index, rect);
  });
}

function drawCheckpoints(level) {
  level.checkpoints.forEach((checkpoint, index) => {
    const rect = rectFor('checkpoint', checkpoint);
    ctx.fillStyle = COLORS.checkpoint;
    ctx.fillRect(rect.x + rect.w / 2 - 2, rect.y, 4, rect.h);
    ctx.beginPath();
    ctx.moveTo(rect.x + rect.w / 2 + 2, rect.y);
    ctx.lineTo(rect.x + rect.w / 2 + 28, rect.y + 10);
    ctx.lineTo(rect.x + rect.w / 2 + 2, rect.y + 20);
    ctx.closePath();
    ctx.fill();
    drawLabel(`cp ${index + 1}`, rect.x + 2, rect.y - 5);
    drawSelection('checkpoint', index, rect);
  });
}

function drawFinish(level) {
  const rect = rectFor('finish', { x: level.endX - FINISH_FLAG_OFFSET });
  ctx.fillStyle = COLORS.finish;
  ctx.fillRect(rect.x + rect.w / 2 - 2, rect.y, 4, rect.h);
  ctx.fillStyle = '#c0342b';
  ctx.fillRect(rect.x + rect.w / 2 + 2, rect.y + 5, 32, 22);
  drawLabel('finish', rect.x - 2, rect.y - 5);
}

function drawSelection(kind, index, rect) {
  if (!isSelected(kind, index)) return;
  ctx.save();
  ctx.strokeStyle = COLORS.selected;
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.strokeRect(rect.x - 3, rect.y - 3, rect.w + 6, rect.h + 6);
  ctx.setLineDash([]);
  const item = state.level[collectionFor(kind)]?.[index];
  if (isResizable(kind, item)) {
    ctx.fillStyle = COLORS.selected;
    ctx.fillRect(rect.x - 5, rect.y + rect.h / 2 - 8, 10, 16);
    ctx.fillRect(rect.x + rect.w - 5, rect.y + rect.h / 2 - 8, 10, 16);
  }
  ctx.restore();
}

function drawLabel(text, x, y) {
  ctx.save();
  ctx.font = '11px ui-monospace, monospace';
  ctx.textBaseline = 'bottom';
  const width = ctx.measureText(text).width + 8;
  ctx.fillStyle = 'rgba(0,0,0,0.58)';
  ctx.fillRect(x - 2, y - 14, width, 15);
  ctx.fillStyle = '#f6f0e7';
  ctx.fillText(text, x + 2, y - 2);
  ctx.restore();
}

function rectFor(kind, item) {
  const z = state.zoom;
  if (kind === 'gap') {
    return { x: item.x * z, y: GROUND_Y, w: item.width * z, h: GROUND_H };
  }
  if (kind === 'platform') {
    return { x: item.x * z, y: item.y, w: item.width * z, h: PLATFORM_H };
  }
  if (kind === 'obstacle') {
    if (item.type === 'crumbling_platform') {
      const width = item.width || 96;
      const y = item.y ?? 398;
      return { x: (item.x - width / 2) * z, y, w: width * z, h: PLATFORM_H };
    }
    const def = getObstacleDef(item.type);
    const y = item.y ?? GROUND_Y;
    const w = Math.max(18, def.w * 0.65);
    const h = Math.max(18, def.h * 0.65);
    return { x: item.x * z - w / 2, y: y - h, w, h };
  }
  if (kind === 'checkpoint') {
    return { x: item.x * z - 12, y: GROUND_Y - 54, w: 24, h: 54 };
  }
  return { x: item.x * z - 12, y: GROUND_Y - 92, w: 24, h: 92 };
}

function hitTest(point) {
  const groups = [
    ['checkpoint', state.level.checkpoints],
    ['obstacle', state.level.obstacles],
    ['platform', state.level.platforms],
    ['gap', state.level.gaps],
  ];
  for (const [kind, items] of groups) {
    for (let index = items.length - 1; index >= 0; index -= 1) {
      const rect = rectFor(kind, items[index]);
      if (!contains(rect, point)) continue;
      let handle = 'move';
      if (isResizable(kind, items[index]) && Math.abs(point.x - rect.x) <= 8) handle = 'resize-left';
      if (isResizable(kind, items[index]) && Math.abs(point.x - (rect.x + rect.w)) <= 8) handle = 'resize-right';
      return { kind, index, handle };
    }
  }
  return null;
}

function contains(rect, point) {
  return point.x >= rect.x && point.x <= rect.x + rect.w && point.y >= rect.y && point.y <= rect.y + rect.h;
}

function isResizable(kind, item) {
  return kind === 'platform' || kind === 'gap' || (kind === 'obstacle' && item?.type === 'crumbling_platform');
}

function onPointerDown(event) {
  if (!state.level) return;
  const point = pointerPoint(event);
  const hit = hitTest(point);
  state.selected = hit ? { kind: hit.kind, index: hit.index } : null;
  if (hit) {
    const item = getSelectedItem();
    state.drag = {
      ...hit,
      startPointer: screenToWorld(point),
      startItem: clone(item),
      historyPushed: false,
    };
    dom.stage.classList.add('dragging');
  }
  renderProps();
  updateOutput();
  draw();
}

function onPointerMove(event) {
  const point = pointerPoint(event);
  state.pointer = screenToWorld(point);
  dom.mouseMeta.textContent = `x: ${Math.round(state.pointer.x)}, y: ${Math.round(state.pointer.y)}`;
  if (!state.drag) {
    state.hover = hitTest(point);
    return;
  }
  applyDrag(point);
  renderProps();
  updateOutput();
  draw();
}

function onPointerUp() {
  state.drag = null;
  dom.stage.classList.remove('dragging');
}

function pointerPoint(event) {
  const bounds = dom.stage.getBoundingClientRect();
  return {
    x: (event.clientX - bounds.left) * (dom.stage.width / bounds.width),
    y: (event.clientY - bounds.top) * (dom.stage.height / bounds.height),
  };
}

function screenToWorld(point) {
  return { x: point.x / state.zoom, y: point.y };
}

function applyDrag(point) {
  const drag = state.drag;
  const item = state.level[collectionFor(drag.kind)][drag.index];
  if (!drag.historyPushed) {
    pushHistory();
    drag.historyPushed = true;
  }
  const current = screenToWorld(point);
  const dx = current.x - drag.startPointer.x;
  const dy = current.y - drag.startPointer.y;
  const snap = getSnap();

  if (drag.kind === 'platform') {
    if (drag.handle === 'resize-left') {
      const right = drag.startItem.x + drag.startItem.width;
      item.x = clamp(snapValue(drag.startItem.x + dx, snap), 0, right - snap);
      item.width = Math.max(snap, snapValue(right - item.x, snap));
    } else if (drag.handle === 'resize-right') {
      item.width = Math.max(snap, snapValue(drag.startItem.width + dx, snap));
    } else {
      item.x = clamp(snapValue(drag.startItem.x + dx, snap), 0, state.level.endX - item.width);
      item.y = clamp(snapValue(drag.startItem.y + dy, snap), 80, GROUND_Y - PLATFORM_H);
    }
  } else if (drag.kind === 'gap') {
    if (drag.handle === 'resize-left') {
      const right = drag.startItem.x + drag.startItem.width;
      item.x = clamp(snapValue(drag.startItem.x + dx, snap), 0, right - snap);
      item.width = Math.max(snap, snapValue(right - item.x, snap));
    } else if (drag.handle === 'resize-right') {
      item.width = Math.max(snap, snapValue(drag.startItem.width + dx, snap));
    } else {
      item.x = clamp(snapValue(drag.startItem.x + dx, snap), 0, state.level.endX - item.width);
    }
  } else if (drag.kind === 'obstacle') {
    if (item.type === 'crumbling_platform' && drag.handle === 'resize-left') {
      const startLeft = drag.startItem.x - (drag.startItem.width || 96) / 2;
      const startRight = drag.startItem.x + (drag.startItem.width || 96) / 2;
      const left = clamp(snapValue(startLeft + dx, snap), 0, startRight - snap);
      item.width = Math.max(snap, snapValue(startRight - left, snap));
      item.x = Math.round(left + item.width / 2);
      cleanupNumbers(item);
      return;
    }
    if (item.type === 'crumbling_platform' && drag.handle === 'resize-right') {
      item.width = Math.max(snap, snapValue((drag.startItem.width || 96) + dx, snap));
      cleanupNumbers(item);
      return;
    }
    item.x = clamp(snapValue(drag.startItem.x + dx, snap), 0, state.level.endX);
    if (drag.startItem.y !== undefined || Math.abs(dy) > snap) {
      item.y = clamp(snapValue((drag.startItem.y ?? GROUND_Y) + dy, snap), 40, GROUND_Y);
      if (item.y === GROUND_Y) delete item.y;
    }
  } else if (drag.kind === 'checkpoint') {
    item.x = clamp(snapValue(drag.startItem.x + dx, snap), 0, state.level.endX);
  }
  cleanupNumbers(item);
}

function addAtView() {
  if (!state.level) return;
  pushHistory();
  const snap = getSnap();
  const x = snapValue((dom.canvasScroll.scrollLeft + dom.canvasScroll.clientWidth * 0.5) / state.zoom, snap);
  const type = dom.addType.value;
  let item;
  if (type === 'platform') {
    item = { x, y: 380, width: 100 };
    state.level.platforms.push(item);
    state.selected = { kind: 'platform', index: state.level.platforms.length - 1 };
  } else if (type === 'gap') {
    item = { x, width: 120 };
    state.level.gaps.push(item);
    state.selected = { kind: 'gap', index: state.level.gaps.length - 1 };
  } else if (type === 'obstacle') {
    item = { type: dom.obstacleType.value, x };
    if (item.type === 'crumbling_platform') {
      item.y = 398;
      item.width = 96;
    }
    state.level.obstacles.push(item);
    state.selected = { kind: 'obstacle', index: state.level.obstacles.length - 1 };
  } else {
    item = { x };
    state.level.checkpoints.push(item);
    state.selected = { kind: 'checkpoint', index: state.level.checkpoints.length - 1 };
  }
  renderProps();
  updateOutput();
  draw();
}

function deleteSelection() {
  if (!state.selected) return;
  pushHistory();
  const collection = state.level[collectionFor(state.selected.kind)];
  collection.splice(state.selected.index, 1);
  state.selected = null;
  renderProps();
  updateOutput();
  draw();
}

function flipSelectedObstacle() {
  if (!state.selected || state.selected.kind !== 'obstacle') return;
  const item = getSelectedItem();
  if (!item) return;
  pushHistory();
  const defaultFlipX = getObstacleDef(item.type).flipX ?? false;
  const current = (item.flipX !== undefined) ? item.flipX : defaultFlipX;
  const next = !current;
  if (next === defaultFlipX) {
    delete item.flipX;
  } else {
    item.flipX = next;
  }
  cleanupNumbers(item);
  renderProps();
  updateOutput();
  draw();
}

function renderProps() {
  const item = getSelectedItem();
  dom.deleteBtn.disabled = !item;
  dom.emptyProps.classList.toggle('hidden', !!item);
  dom.propFields.classList.toggle('hidden', !item);
  dom.propFields.replaceChildren();
  if (!item) {
    dom.selectionMeta.textContent = 'No selection';
    dom.flipBtn.disabled = true;
    return;
  }

  const kind = state.selected.kind;
  dom.flipBtn.disabled = kind !== 'obstacle';
  dom.selectionMeta.textContent = `${kind} ${state.selected.index + 1}`;
  if (kind === 'obstacle') addField('type', item.type, 'select', OBSTACLE_TYPES);
  addField('x', item.x, 'number');
  if (kind === 'platform' || item.y !== undefined || kind === 'obstacle') addField('y', item.y ?? GROUND_Y, 'number');
  if (kind === 'platform' || kind === 'gap' || item.width !== undefined) addField('width', item.width, 'number');
  if (kind === 'platform') addField('crumbling', item.crumbling ? 'true' : 'false', 'select', ['false', 'true']);
  if (kind === 'obstacle') {
    const flipValue = item.flipX === undefined ? 'default' : (item.flipX ? 'true' : 'false');
    addField('flipX', flipValue, 'select', ['default', 'true', 'false']);
    ['speed', 'vy', 'amp', 'sineSpeed', 'offset', 'paceMin', 'paceMax'].forEach(key => {
      if (item[key] !== undefined) addField(key, item[key], 'number');
    });
  }
}

function addField(key, value, inputType, options = []) {
  const label = document.createElement('label');
  label.textContent = key;
  const input = inputType === 'select' ? document.createElement('select') : document.createElement('input');
  if (inputType === 'select') {
    options.forEach(optionValue => {
      const option = document.createElement('option');
      option.value = optionValue;
      option.textContent = optionValue;
      input.append(option);
    });
  } else {
    input.type = inputType;
    input.step = '1';
  }
  input.value = value;
  input.addEventListener('change', () => updateSelectedField(key, input.value));
  label.append(input);
  dom.propFields.append(label);
}

function updateSelectedField(key, rawValue) {
  const item = getSelectedItem();
  if (!item) return;
  pushHistory();
  if (key === 'type') item[key] = rawValue;
  else if (key === 'crumbling') {
    if (rawValue === 'true') item.crumbling = true;
    else delete item.crumbling;
  } else if (key === 'flipX') {
    if (rawValue === 'default') delete item.flipX;
    else item.flipX = rawValue === 'true';
  } else {
    const value = Number(rawValue);
    if (Number.isFinite(value)) item[key] = value;
    if (key === 'y' && value === GROUND_Y && state.selected.kind === 'obstacle') delete item.y;
  }
  cleanupNumbers(item);
  renderProps();
  updateOutput();
  draw();
}

function updateOutput() {
  if (!state.level) return;
  dom.levelMeta.textContent = `Level ${state.level.id} | ${state.level.name} | endX ${state.level.endX}`;
  dom.jsonOutput.value = `${JSON.stringify(state.level, null, 2)}\n`;
}

function importFromOutput() {
  const parsed = JSON.parse(dom.jsonOutput.value);
  pushHistory();
  setLevel(parsed, { resetHistory: false });
}

function pushHistory() {
  if (!state.level) return;
  state.history.push({
    level: clone(state.level),
    selected: state.selected ? { ...state.selected } : null,
  });
  if (state.history.length > 100) state.history.shift();
  updateUndoButton();
}

function undo() {
  const previous = state.history.pop();
  if (!previous) return;
  state.level = previous.level;
  ensureArrays(state.level);
  state.selected = previous.selected;
  state.drag = null;
  resizeCanvas();
  renderProps();
  updateOutput();
  draw();
  updateUndoButton();
}

function updateUndoButton() {
  dom.undoBtn.disabled = state.history.length === 0;
}

function getSelectedItem() {
  if (!state.selected) return null;
  return state.level[collectionFor(state.selected.kind)]?.[state.selected.index] || null;
}

function collectionFor(kind) {
  return `${kind}s`;
}

function isSelected(kind, index) {
  return state.selected?.kind === kind && state.selected.index === index;
}

function getSnap() {
  return Math.max(1, Number(dom.snapInput.value) || 1);
}

function snapValue(value, snap) {
  return Math.round(value / snap) * snap;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function cleanupNumbers(item) {
  Object.keys(item).forEach(key => {
    if (typeof item[key] === 'number') item[key] = Math.round(item[key]);
  });
}

function obstacleLabel(item) {
  if (item.flipX === undefined) return item.type;
  return `${item.type} [flipX ${item.flipX ? 'on' : 'off'}]`;
}

function obstacleColor(type) {
  const colors = {
    prairie_dog: '#9a7330',
    tumbleweed: '#b39352',
    hay_bale: '#d6bb46',
    road_cone: '#f26a21',
    deer: '#b97838',
    cyclist: '#477fca',
    boulder: '#8f9189',
    hawk: '#7b5738',
    steel_steps: '#9ca5ac',
    rattlesnake: '#6c9636',
    folding_chair: '#c9c069',
    barbed_wire_bat: '#7a4a2a',
    crowd_barrier: '#557e9b',
    spotlight: '#e6df8a',
    crumbling_platform: '#9c7831',
  };
  return colors[type] || COLORS.obstacle;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
</script>
